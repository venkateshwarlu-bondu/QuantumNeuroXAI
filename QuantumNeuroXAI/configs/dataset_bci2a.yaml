dataset_name: bci2a
raw_dir: data/raw/bci2a
manifest_csv: data/manifests/bci2a_manifest.csv
processed_manifest_csv: data/manifests/bci2a_processed_manifest.csv
processed_dir: data/processed/bci2a

read:
  target_sfreq: 250
  prefer_mne: true

preprocessing:
  bandpass_low: 0.5
  bandpass_high: 45.0
  notch_hz: 50.0
  artifact_z_thresh: 6.0
  normalization: zscore
  window_sec: 4.0
  stride_sec: 2.0
  stft_nperseg: 128
  stft_noverlap: 64
  target_freq_bins: 64
  target_time_bins: 64

task:
  mode: multiclass
  num_classes: 4
