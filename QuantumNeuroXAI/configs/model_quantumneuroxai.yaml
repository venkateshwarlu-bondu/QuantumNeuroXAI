name: quantumneuroxai
input_channels: 1

quantum:
  pooled_dim: 256
  proj_dim: 128
  feature_depth: 2
  measure_dim: 64
  phase_scale: 3.14159

cnn:
  conv_channels: [16, 32, 64]
  kernel_size: 3
  dropout: 0.2

rnn:
  type: gru
  hidden_size: 128
  num_layers: 1
  bidirectional: true
  dropout: 0.1

attention:
  hidden_size: 128

fusion:
  hidden_dim: 128
  dropout: 0.2

head:
  binary_out_dim: 1
  multiclass_out_dim: 4
