dataset_name: chbmit
raw_dir: data/raw/chbmit
manifest_csv: data/manifests/chbmit_manifest.csv
processed_manifest_csv: data/manifests/chbmit_processed_manifest.csv
processed_dir: data/processed/chbmit

read:
  target_sfreq: 256
  prefer_mne: true

preprocessing:
  bandpass_low: 0.5
  bandpass_high: 40.0
  notch_hz: 50.0
  artifact_z_thresh: 6.0
  normalization: zscore
  window_sec: 4.0
  stride_sec: 2.0
  stft_nperseg: 128
  stft_noverlap: 64
  target_freq_bins: 64
  target_time_bins: 64

task:
  mode: binary
